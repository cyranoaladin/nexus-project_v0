# =============================================================================
# CI Pipeline - Nexus Reussite
# =============================================================================
#
# Pipeline with dependency-integrity gate, lint, typecheck, tests, security, build.
# All jobs must pass for merge into main.
#
# Triggers:
# - Pull requests vers main
# - Push sur main (pour verifier apres merge)
#
# Jobs:
# 0. dependency-integrity - npm ci + tree validation + audit
# 1. lint                 - ESLint check
# 2. typecheck            - TypeScript validation
# 3. unit                 - Tests unitaires (jsdom, pas de DB)
# 4. integration          - Tests integration (node + PostgreSQL)
# 5. e2e                  - Tests E2E (Playwright + app demarree + DB E2E)
# 6. security             - semgrep + OSV scanner
# 7. build                - Next.js production build + artifact audit
#
# =============================================================================

name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when new commits pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22.23.1'
  NPM_VERSION: '10.9.8'
  # CI optimizations
  CI: true
  FORCE_COLOR: 1
  # Optional notifications are fail-closed in CI and never receive credentials.
  TELEGRAM_NOTIFICATIONS_ENABLED: 'false'

jobs:
  # ===========================================================================
  # JOB 0: DEPENDENCY INTEGRITY
  # ===========================================================================
  dependency-integrity:
    name: Dependency Integrity
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Pin npm version
        run: |
          npm install -g npm@${{ env.NPM_VERSION }}
          node --version
          npm --version
          test "$(node --version)" = "v${{ env.NODE_VERSION }}"
          test "$(npm --version)" = "${{ env.NPM_VERSION }}"

      - name: Install dependencies
        run: npm ci

      - name: Validate npm tree
        run: |
          npm ls --all --json --long > /tmp/npm-tree.json
          node scripts/validate-npm-tree.js \
            --tree /tmp/npm-tree.json \
            --exceptions security/npm-tree-exceptions.json

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Audit all dependencies
        run: npm audit --audit-level=high

      - name: Generate SBOM
        run: npm run sbom:runtime

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: runtime-sbom
          path: security/sbom/runtime.cdx.json
          retention-days: 30

  # ===========================================================================
  # JOB 1: LINT
  # ===========================================================================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dependency-integrity]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Pin npm version
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Security repo scan
        run: npm run security:repo

      - name: Run ESLint
        run: npm run lint

      - name: Check docs archive placement
        run: npm run check:docs-archive

  # ===========================================================================
  # JOB 2: TYPECHECK
  # ===========================================================================
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [dependency-integrity]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Pin npm version
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Check TypeScript errors with threshold
        run: node .github/scripts/check-typescript-errors.js 0

  # ===========================================================================
  # JOB 3: UNIT TESTS
  # ===========================================================================
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [lint, typecheck]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Pin npm version
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Install PDF tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends poppler-utils texlive-latex-base texlive-latex-recommended
          pdflatex --version
          pdfinfo -v
          pdftotext -v
          pdfimages -v

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run unit tests
        run: npm test -- --ci --coverage --maxWorkers=2
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_test
          NEXTAUTH_SECRET: test-secret-min-32-chars-long-for-ci-environment
          NEXTAUTH_URL: http://localhost:3000

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: coverage/
          retention-days: 7

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-logs
          path: |
            *.log
            npm-debug.log*
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================================================
  # JOB 4: INTEGRATION TESTS (with PostgreSQL)
  # ===========================================================================
  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Pin npm version
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres to be ready
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5432 -U postgres; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Create .env.test for test database
        run: |
          echo 'DATABASE_URL="postgresql://postgres:postgres@localhost:5432/nexus_test?schema=public"' > .env.test
          echo 'TEST_DATABASE_URL="postgresql://postgres:postgres@localhost:5432/nexus_test?schema=public"' >> .env.test
          echo 'NODE_ENV="test"' >> .env.test
          printf '%s=%s\n' 'NEXTAUTH_SECRET' 'test-secret-min-32-chars-long-for-ci-environment' >> .env.test
          echo 'NEXTAUTH_URL="http://localhost:3000"' >> .env.test

      - name: Generate Prisma Client
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_test
        run: npx prisma generate

      - name: Reset database before migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_test
        run: |
          npx prisma db execute --schema=prisma/schema.prisma --stdin <<SQL
          DROP SCHEMA IF EXISTS public CASCADE;
          CREATE SCHEMA public;
          SQL

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_test
        run: npx prisma migrate deploy

      - name: Verify database tables
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_test
        run: |
          npx prisma db execute --schema=prisma/schema.prisma --stdin <<SQL
          SELECT table_name FROM information_schema.tables
          WHERE table_schema = 'public' AND table_type = 'BASE TABLE'
          ORDER BY table_name;
          SQL

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_test
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_test?schema=public
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret-min-32-chars-long-for-ci-environment' }}
          NODE_ENV: test
        run: npm run test:db-integration -- --ci

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-logs
          path: |
            *.log
            npm-debug.log*
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================================================
  # JOB 5: E2E TESTS (with Playwright + E2E DB)
  # ===========================================================================
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: [lint, typecheck]

    services:
      postgres-e2e:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_e2e
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d nexus_e2e"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Pin npm version
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Wait for Postgres (E2E) to be ready
        run: |
          for i in {1..30}; do
            if pg_isready -h localhost -p 5433 -U postgres; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for Postgres... ($i/30)"
            sleep 2
          done
          echo "Postgres did not become ready in time"
          exit 1

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Seed E2E test data
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/nexus_e2e
        run: |
          npx prisma db execute --schema=prisma/schema.prisma --stdin <<SQL
          DROP SCHEMA IF EXISTS public CASCADE;
          CREATE SCHEMA public;
          SQL
          npx prisma migrate deploy
          npx tsx scripts/seed-e2e-db.ts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js for E2E
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/nexus_e2e
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret-min-32-chars-long-for-ci-environment' }}
          AUTH_TRUST_HOST: 'true'
          OPENAI_API_KEY: sk-test-mock-key-for-ci-build-only
          NODE_ENV: production
        run: npm run build

      - name: Start Next.js server in background
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/nexus_e2e
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret-min-32-chars-long-for-ci-environment' }}
          AUTH_TRUST_HOST: 'true'
          OPENAI_API_KEY: sk-test-mock-key-for-ci-build-only
          NODE_ENV: production
          RATE_LIMIT_DISABLE: '1'
        run: |
          cp -r .next/static .next/standalone/.next/static 2>/dev/null || true
          cp -r public .next/standalone/public 2>/dev/null || true
          node .next/standalone/server.js &
          echo $! > .next-server.pid
          for i in {1..30}; do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Server + Health API ready"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start (health endpoint not responding)"
          curl -v http://localhost:3000/api/health 2>&1 || true
          exit 1

      - name: Run Playwright E2E tests
        timeout-minutes: 20
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5433/nexus_e2e
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret-min-32-chars-long-for-ci-environment' }}
          AUTH_TRUST_HOST: 'true'
          REUSE_EXISTING_SERVER: 'true'
        run: npx playwright test --config=playwright.ci.config.ts --project=chromium

      - name: Stop Next.js server
        if: always()
        run: |
          if [ -f .next-server.pid ]; then
            kill $(cat .next-server.pid) || true
            rm .next-server.pid
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-screenshots
          path: test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload E2E logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-logs
          path: |
            *.log
            npm-debug.log*
            .next/trace
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================================================
  # JOB 6: SECURITY SCANNING
  # ===========================================================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [dependency-integrity]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Pin npm version
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      # --- SEMGREP ---
      - name: Run Semgrep
        continue-on-error: true
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/typescript
            p/nextjs

      # --- OSV SCANNER (Google) ---
      - name: Install OSV Scanner
        run: |
          curl -sSL https://github.com/google/osv-scanner/releases/download/v1.9.0/osv-scanner_linux_amd64 -o osv-scanner
          chmod +x osv-scanner

      - name: Run OSV Scanner
        continue-on-error: true
        run: |
          ./osv-scanner --lockfile=package-lock.json --format=json --output=osv-report.json || true

      - name: Upload OSV report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osv-report
          path: osv-report.json
          retention-days: 7
          if-no-files-found: ignore

  # ===========================================================================
  # JOB 7: BUILD PRODUCTION
  # ===========================================================================
  build:
    name: Production Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, typecheck]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nexus_prod
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Pin npm version
        run: npm install -g npm@${{ env.NPM_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Build Next.js production bundle
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_prod
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'test-secret-min-32-chars-long-for-ci-environment' }}
          OPENAI_API_KEY: sk-test-mock-key-for-ci-build-only
          NODE_ENV: production
        run: npm run build

      - name: Smoke test standalone server
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/nexus_prod
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: test-secret-min-32-chars-long-for-ci-environment
          NODE_ENV: production
        run: |
          node .next/standalone/server.js &
          SERVER_PID=$!
          for i in {1..20}; do
            if curl -sf http://localhost:3000/api/health > /dev/null 2>&1; then
              echo "Standalone server healthy"
              kill $SERVER_PID || true
              exit 0
            fi
            sleep 2
          done
          echo "Standalone server did not respond to /api/health"
          kill $SERVER_PID || true
          exit 1

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-build
          path: .next/
          retention-days: 7
          if-no-files-found: ignore

      - name: Check build size
        run: |
          echo "### Build Size Report" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          du -sh .next/ 2>/dev/null >> $GITHUB_STEP_SUMMARY || echo "(standalone output)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # JOB 8: STATUS CHECK (All jobs must pass)
  # ===========================================================================
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [dependency-integrity, lint, typecheck, unit, integration, e2e, security, build]
    if: ${{ always() && !cancelled() }}

    steps:
      - name: Check all jobs status
        run: |
          FAIL=0

          # Required jobs: must be 'success'
          for result_pair in \
            "dependency-integrity:${{ needs.dependency-integrity.result }}" \
            "lint:${{ needs.lint.result }}" \
            "typecheck:${{ needs.typecheck.result }}" \
            "unit:${{ needs.unit.result }}" \
            "integration:${{ needs.integration.result }}" \
            "build:${{ needs.build.result }}"; do
            job="${result_pair%%:*}"
            result="${result_pair#*:}"
            if [ "$result" != "success" ]; then
              echo "FAIL $job: $result"
              FAIL=1
            else
              echo "OK $job: $result"
            fi
          done

          # E2E: allow 'cancelled' (from cancel-in-progress on newer push)
          E2E_RESULT="${{ needs.e2e.result }}"
          if [ "$E2E_RESULT" = "success" ]; then
            echo "OK e2e: $E2E_RESULT"
          elif [ "$E2E_RESULT" = "cancelled" ]; then
            echo "WARN e2e: $E2E_RESULT (cancelled by newer push)"
          else
            echo "FAIL e2e: $E2E_RESULT"
            FAIL=1
          fi

          # Security: informational only
          echo "INFO security: ${{ needs.security.result }} (allowed to fail)"

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "CI Pipeline Failed"
            exit 1
          fi
          echo ""
          echo "All CI checks passed"
