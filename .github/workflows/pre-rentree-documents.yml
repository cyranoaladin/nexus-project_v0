name: Pré-rentrée 2026 documents

on:
  pull_request:
    paths:
      - "content/pre-rentree-2026/**"
      - "data/campaigns/pre-rentree-2026.json"
      - "data/pricing.canonical.json"
      - "lib/legal.ts"
      - "lib/analytics.ts"
      - "lib/campaigns/pre-rentree-2026/**"
      - "app/stages/pre-rentree-2026/**"
      - "components/pre-rentree-2026/**"
      - "components/marketing/PreRentreeCampaignSpotlight.tsx"
      - "__tests__/**/*pre-rentree-2026*"
      - "scripts/pre-rentree/**"
      - "generated/pre-rentree-2026/**"
      - "docs/campaigns/pre-rentree-2026/**"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pre-rentree-documents.yml"
  push:
    branches:
      - codex/pre-rentree-2026-v5-canonical
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pre-rentree-documents-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  documents:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      SOURCE_DATE_EPOCH: "1784505600"
      PYTHONDONTWRITEBYTECODE: "1"
      PRE_RENTREE_REPOSITORY_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "22.23.1"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/pre-rentree/requirements.lock

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install --yes poppler-utils qpdf fonts-dejavu-core

      - name: Install Node dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Install Python dependencies
        run: python -m pip install -r scripts/pre-rentree/requirements.lock

      - name: Build and verify documents
        run: npm run pre-rentree:ci

      - name: Confirm generated snapshot and worktree are unchanged
        run: git diff --exit-code && test -z "$(git status --short)"

      - name: Write job summary
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import hashlib
          from pathlib import Path
          print("## Pré-rentrée 2026")
          for path in sorted(Path(".artifacts/pre-rentree-2026/packages").glob("*.zip")):
              digest = hashlib.sha256(path.read_bytes()).hexdigest()
              print(f"- `{path.name}` — {path.stat().st_size} octets — `{digest}`")
          PY

      - name: Upload parent package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pre-rentree-2026-parent-package
          path: .artifacts/pre-rentree-2026/packages/NexusReussite_PreRentree2026_PARENT_PACKAGE.zip
          if-no-files-found: error
          retention-days: 14

      - name: Upload owner-review package
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pre-rentree-2026-owner-review-package
          path: .artifacts/pre-rentree-2026/packages/NexusReussite_PreRentree2026_REVIEW_PACKAGE.zip
          if-no-files-found: error
          retention-days: 14
