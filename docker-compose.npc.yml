# ═══════════════════════════════════════════════════════════════════════════════
# NPC Worker - Docker Compose Service
# Run alongside the main nexus-app service
# ═══════════════════════════════════════════════════════════════════════════════

version: '3.8'

services:
  npc-worker:
    build:
      context: .
      dockerfile: services/npc-worker/Dockerfile
    container_name: nexus-npc-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - NPC_UPLOAD_DIR=/var/lib/nexus/uploads/copies
      - CHUTES_API_KEY=${CHUTES_API_KEY}
      - CHUTES_BASE_URL=${CHUTES_BASE_URL:-https://api.chutes.ai}
      - NPC_LLM_MODE=${NPC_LLM_MODE:-stub}
      - NPC_WORKER_POLL_INTERVAL_MS=${NPC_WORKER_POLL_INTERVAL_MS:-5000}
      - NPC_WORKER_LOCK_DURATION_MS=${NPC_WORKER_LOCK_DURATION_MS:-300000}
      - NPC_MAX_RETRY_ATTEMPTS=${NPC_MAX_RETRY_ATTEMPTS:-3}
    volumes:
      - npc-uploads:/var/lib/nexus/uploads/copies:ro
    depends_on:
      - db
    networks:
      - nexus-network
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('healthy')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  npc-uploads:
    driver: local

networks:
  nexus-network:
    external: true
